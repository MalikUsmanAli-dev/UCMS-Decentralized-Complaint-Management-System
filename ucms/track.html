<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Track Complaint — UniComplaints</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="ucms-navbar d-flex align-items-center px-3 gap-2">
  <button id="sidebarToggle" class="btn btn-sm btn-outline-light d-lg-none me-1"><i class="bi bi-list fs-5"></i></button>
  <span class="navbar-brand me-auto"><i class="bi bi-shield-check me-2"></i>Uni<span>Complaints</span></span>
  <button id="themeToggle" class="btn btn-sm btn-outline-light rounded-pill px-3"><i class="bi bi-moon-fill"></i></button>
  <button id="walletBtn" class="btn btn-sm btn-primary btn-ucms"><i class="bi bi-wallet2 me-1"></i>Connect Wallet</button>
</nav>
<div style="position:fixed;top:70px;right:1rem;z-index:9999;width:360px;max-width:95vw"><div id="alertContainer"></div></div>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<aside class="ucms-sidebar" id="sidebar">
  <div class="px-3 mb-3 d-flex align-items-center gap-2">
    <div style="width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center"><i class="bi bi-shield-check text-white"></i></div>
    <div><div class="text-white fw-700 small">UniComplaints</div><div style="color:rgba(255,255,255,0.4);font-size:0.65rem">Blockchain v1.0</div></div>
  </div>
  <hr style="border-color:rgba(255,255,255,0.1);margin:0.5rem 1rem 1rem">
  <div class="sidebar-heading">Student</div>
  <a href="dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
  <a href="register.html"  class="sidebar-link"><i class="bi bi-plus-circle"></i>File Complaint</a>
  <a href="track.html"     class="sidebar-link"><i class="bi bi-search"></i>Track Complaint</a>
  <a href="vote.html"      class="sidebar-link"><i class="bi bi-hand-thumbs-up"></i>Vote</a>
  <a href="reopen.html"    class="sidebar-link"><i class="bi bi-arrow-repeat"></i>Reopen</a>
  <div class="sidebar-heading mt-3">Admin</div>
  <a href="admin.html"     class="sidebar-link"><i class="bi bi-gear"></i>Admin Panel</a>
  <a href="analytics.html" class="sidebar-link"><i class="bi bi-bar-chart-line"></i>Analytics</a>
  <div class="sidebar-heading mt-3">General</div>
  <a href="index.html"     class="sidebar-link"><i class="bi bi-house"></i>Home</a>
</aside>
<main class="ucms-main">
  <div class="page-header">
    <h1><i class="bi bi-search me-2 text-primary"></i>Track Complaint</h1>
    <p>Enter a complaint ID to retrieve full on-chain details</p>
  </div>
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="glass-card p-4 mb-4">
        <div class="input-group">
          <span class="input-group-text bg-primary text-white border-0"><i class="bi bi-hash"></i></span>
          <input type="number" class="form-control form-control-lg border-0" id="trackId" placeholder="Enter Complaint ID (e.g. 1, 2, 3…)" min="1"/>
          <button class="btn btn-primary btn-ucms px-4" id="trackBtn">
            <i class="bi bi-search me-2"></i>Track
          </button>
        </div>
      </div>
      <div id="trackResult"></div>
    </div>
  </div>
</main>
<footer class="ucms-footer" style="margin-left:var(--sidebar-w)">
  Developed by: <strong>Usman Ali</strong> &nbsp;|&nbsp; Reg No: <strong>YOUR_REGISTRATION_NUMBER</strong>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
<script src="contracts/abi.js"></script>
<script src="js/contract.js"></script>
<script src="js/wallet.js"></script>
<script src="js/app.js"></script>
<script>
async function trackComplaint() {
  const id = parseInt(document.getElementById("trackId").value);
  if (!id || id < 1) { showAlert("warning","Please enter a valid complaint ID."); return; }
  showSpinner("trackBtn","Fetching…");
  document.getElementById("trackResult").innerHTML = `<div class="text-center py-4"><span class="spinner-border text-primary me-2"></span>Reading blockchain data…</div>`;
  try {
    const c = await getReadOnlyContract();
    const comp = await c.getComplaint(id);
    const title   = comp[0];
    const desc    = comp[1];
    const student = comp[2];
    const dept    = comp[3];
    const status  = Number(comp[4]);
    const priority= Number(comp[5]);
    const votes   = Number(comp[6]);
    const remark  = comp[7] || "No remarks yet.";
    document.getElementById("trackResult").innerHTML = `
      <div class="glass-card p-4 mb-3">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div>
            <span class="badge bg-secondary me-2">#${id}</span>
            <span class="status-badge badge bg-${STATUS_COLORS[status]}">${STATUS_LABELS[status]}</span>
            <span class="priority-badge badge bg-${PRIORITY_COLORS[priority]} ms-1">${PRIORITY_LABELS[priority]} Priority</span>
          </div>
          <span class="badge bg-primary"><i class="bi bi-hand-thumbs-up me-1"></i>${votes} votes</span>
        </div>
        <h4 class="fw-700 mb-1">${title}</h4>
        <span class="badge bg-info text-dark mb-3"><i class="bi bi-building me-1"></i>${dept}</span>
        <h6 class="fw-600 small text-uppercase text-muted mt-3 mb-2">Description</h6>
        <p class="text-muted" style="line-height:1.7">${desc}</p>
        <h6 class="fw-600 small text-uppercase text-muted mt-3 mb-2">Submitted By</h6>
        <div class="font-monospace small p-2" style="background:rgba(37,99,235,0.06);border-radius:8px;word-break:break-all">${student}</div>
        <h6 class="fw-600 small text-uppercase text-muted mt-3 mb-2">Admin Remarks</h6>
        <div class="p-3" style="background:rgba(245,158,11,0.08);border-left:3px solid #f59e0b;border-radius:0 8px 8px 0">
          <i class="bi bi-chat-quote-fill text-warning me-2"></i>${remark}
        </div>
      </div>
      <div class="d-flex gap-2 justify-content-end">
        <a href="vote.html" class="btn btn-outline-primary btn-ucms"><i class="bi bi-hand-thumbs-up me-1"></i>Support This</a>
        <a href="reopen.html" class="btn btn-outline-warning btn-ucms"><i class="bi bi-arrow-repeat me-1"></i>Reopen</a>
      </div>`;
  } catch (err) {
    document.getElementById("trackResult").innerHTML = `
      <div class="glass-card p-4 text-center">
        <i class="bi bi-exclamation-circle-fill text-danger fs-1 mb-3 d-block"></i>
        <h5 class="fw-700">Complaint Not Found</h5>
        <p class="text-muted">ID #${id} does not exist or the contract is not reachable.</p>
        <small class="text-muted">${err.message}</small>
      </div>`;
  } finally { hideSpinner("trackBtn"); }
}
document.getElementById("trackBtn")?.addEventListener("click", trackComplaint);
document.getElementById("trackId")?.addEventListener("keydown", e => { if(e.key==="Enter") trackComplaint(); });
</script>
</body>
</html>
